<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Tsumiki Greeting</title>
	<style>
		:root {
			color-scheme: light;
			font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			background: #f7e9de;
			color: #201a17;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			overflow: hidden;
			background:
				radial-gradient(circle at 18% 16%, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0) 29rem),
				linear-gradient(135deg, #fbefe6 0%, #f3d3dc 42%, #d3ebf0 100%);
		}

		#stage {
			display: block;
			width: 100vw;
			height: 100vh;
		}

		.toolbar {
			position: fixed;
			left: 50%;
			bottom: max(18px, env(safe-area-inset-bottom));
			display: flex;
			gap: 10px;
			align-items: center;
			max-width: calc(100vw - 24px);
			padding: 10px;
			border: 1px solid rgba(74, 49, 42, 0.14);
			border-radius: 8px;
			background: rgba(255, 250, 246, 0.84);
			box-shadow: 0 18px 48px rgba(74, 49, 42, 0.18);
			backdrop-filter: blur(16px);
			transform: translateX(-50%);
		}

		button {
			min-height: 38px;
			border: 0;
			border-radius: 6px;
			padding: 0 14px;
			background: #2f7b86;
			color: #fff;
			font: inherit;
			font-weight: 700;
			cursor: pointer;
		}

		button:hover {
			background: #256772;
		}

		button:disabled {
			cursor: wait;
			opacity: 0.68;
		}

		#status {
			min-width: 8ch;
			max-width: 52vw;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
			font-size: 13px;
			color: #5c4540;
		}

		@media (max-width: 540px) {
			.toolbar {
				width: calc(100vw - 24px);
				justify-content: space-between;
			}

			button {
				padding: 0 12px;
			}
		}
	</style>
</head>
<body>
	<canvas id="stage"></canvas>
	<div class="toolbar" aria-label="Motion controls">
		<button id="replay" type="button" disabled>Replay Greeting</button>
		<span id="status">Loading</span>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
	<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
	<script>
		const canvas = document.getElementById("stage");
		const statusText = document.getElementById("status");
		const replayButton = document.getElementById("replay");
		const motionParams = new URLSearchParams(window.location.search);
		const motionName = motionParams.get("motion") || "Greeting";
		const motionIndex = Number.parseInt(motionParams.get("index") || "0", 10) || 0;
		const app = new PIXI.Application({
			view: canvas,
			resizeTo: window,
			autoStart: true,
			antialias: true,
			backgroundAlpha: 0
		});

		let model;
		let naturalWidth = 1;
		let naturalHeight = 1;

		function setStatus(text) {
			statusText.textContent = text;
		}

		function fitModel() {
			if (!model) return;
			const width = app.renderer.width;
			const height = app.renderer.height;
			const scale = Math.min(width / naturalWidth * 0.72, height / naturalHeight * 0.88);
			model.scale.set(scale);
			model.position.set(width * 0.5, height * 0.56);
		}

		async function playGreeting() {
			if (!model) return;
			replayButton.disabled = true;
			try {
				await model.motion(motionName, motionIndex, 3);
				setStatus(motionName);
			} catch (error) {
				console.error(error);
				setStatus("Motion error");
			} finally {
				replayButton.disabled = false;
			}
		}

		async function boot() {
			try {
				model = await PIXI.live2d.Live2DModel.from("tsumiki.model3.json", {
					autoInteract: false
				});
				model.anchor.set(0.5, 0.5);
				naturalWidth = model.width || 1;
				naturalHeight = model.height || 1;
				app.stage.addChild(model);
				fitModel();
				replayButton.addEventListener("click", playGreeting);
				setStatus("Ready");
				await playGreeting();
			} catch (error) {
				console.error(error);
				setStatus("Load error");
			}
		}

		window.addEventListener("resize", fitModel);
		window.tsumikiGreetingViewer = {
			app,
			playGreeting,
			get model() {
				return model;
			}
		};
		boot();
	</script>
</body>
</html>
